document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { eliTab: 'credit', selectedTenure: '12m', pdpEliTab: 'plans', pdpCardType: 'credit', qty: 1 };\n\n  componentDidMount() {\n    document.querySelectorAll('.ps').forEach(el => {\n      el.addEventListener('wheel', e => e.stopPropagation(), { passive: true });\n    });\n  }\n\n  renderVals() {\n    // PDP inline state\n    const isPdpPlans  = this.state.pdpEliTab === 'plans';\n    const isPdpCredit = this.state.pdpCardType === 'credit';\n    const qty = this.state.qty;\n    const tb2 = { flex: 1, border: 'none', cursor: 'pointer', borderRadius: 7, padding: '8px 6px', fontSize: 12, transition: 'all 0.15s ease' };\n    const pdpPlanTabStyle  = { ...tb2, background: isPdpPlans ? 'white' : 'transparent', color: isPdpPlans ? '#104D89' : '#777', fontWeight: isPdpPlans ? 700 : 400, boxShadow: isPdpPlans ? '0 1px 4px rgba(0,0,0,0.1)' : 'none' };\n    const pdpExactTabStyle = { ...tb2, background: !isPdpPlans ? 'white' : 'transparent', color: !isPdpPlans ? '#104D89' : '#777', fontWeight: !isPdpPlans ? 700 : 400, boxShadow: !isPdpPlans ? '0 1px 4px rgba(0,0,0,0.1)' : 'none' };\n    const pdpCreditTabStyle = { ...tb2, background: isPdpCredit ? '#104D89' : '#F0F2F5', color: isPdpCredit ? 'white' : '#555', fontWeight: isPdpCredit ? 600 : 400 };\n    const pdpDebitTabStyle  = { ...tb2, background: !isPdpCredit ? '#104D89' : '#F0F2F5', color: !isPdpCredit ? 'white' : '#555', fontWeight: !isPdpCredit ? 600 : 400 };\n\n    // Eligibility tab state (Frame 3)\n    const isCreditTab = this.state.eliTab === 'credit';\n    const tabBase = { flex: 1, border: 'none', cursor: 'pointer', borderRadius: 8, padding: '10px 8px', fontSize: 13, transition: 'all 0.15s ease' };\n    const creditTabStyle = { ...tabBase, background: isCreditTab ? 'white' : 'transparent', color: isCreditTab ? '#104D89' : '#777', fontWeight: isCreditTab ? 700 : 400, boxShadow: isCreditTab ? '0 1px 4px rgba(0,0,0,0.1)' : 'none' };\n    const debitTabStyle  = { ...tabBase, background: !isCreditTab ? 'white' : 'transparent', color: !isCreditTab ? '#104D89' : '#777', fontWeight: !isCreditTab ? 700 : 400, boxShadow: !isCreditTab ? '0 1px 4px rgba(0,0,0,0.1)' : 'none' };\n\n    // EMI price ₹1,04,500 · full pay ₹1,05,000 · No Cost EMI net cost with ₹299 fee = ₹1,04,799\n    // Saving vs full pay = ₹1,05,000 − ₹1,04,799 = ₹201\n    const PLANS = [\n      { tenure: '3m',  emi: '₹34,833', total: '₹1,04,799', netCost: '₹1,04,799', interest: null,      noCost: true,  hasInterest: false, saving: 'Save ₹201 vs full',  budgetNote: 'Higher monthly · done faster' },\n      { tenure: '6m',  emi: '₹17,417', total: '₹1,04,799', netCost: '₹1,04,799', interest: null,      noCost: true,  hasInterest: false, saving: 'Save ₹201 vs full',  budgetNote: 'Mid-range monthly' },\n      { tenure: '9m',  emi: '₹11,611', total: '₹1,04,799', netCost: '₹1,04,799', interest: null,      noCost: true,  hasInterest: false, saving: 'Save ₹201 vs full',  budgetNote: 'Lower monthly budget' },\n      { tenure: '12m', emi: '₹8,708',  total: '₹1,04,799', netCost: '₹1,04,799', interest: null,      noCost: true,  hasInterest: false, saving: 'Save ₹201 vs full',  budgetNote: 'Lowest monthly · longer' },\n      { tenure: '36m', emi: '₹3,726',  total: '₹1,34,435', netCost: '₹1,34,435', interest: '₹29,935', noCost: false, hasInterest: true,  saving: null,                 budgetNote: null },\n    ];\n\n    const sel = this.state.selectedTenure;\n    const selectedPlan = PLANS.find(p => p.tenure === sel) || PLANS[3];\n\n    const planRows = PLANS.map(p => {\n      const isSelected = p.tenure === sel;\n      return {\n        ...p,\n        onClick: () => this.setState({ selectedTenure: p.tenure }),\n        rowStyle: {\n          display: 'flex', alignItems: 'center', padding: '13px 16px', gap: 10,\n          background: isSelected ? '#EEF5FF' : 'white',\n          borderBottom: '1px solid #F0F2F5',\n          cursor: 'pointer',\n          borderLeft: `3px solid ${isSelected ? '#104D89' : p.noCost ? '#107838' : 'transparent'}`,\n          transition: 'background 0.15s ease',\n        },\n        radioStyle: {\n          width: 18, height: 18, borderRadius: '50%', flexShrink: 0,\n          border: `2px solid ${isSelected ? '#104D89' : '#CCC'}`,\n          background: isSelected ? '#104D89' : 'white',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          transition: 'all 0.15s ease',\n        },\n        dotStyle: {\n          width: 6, height: 6, borderRadius: '50%', background: 'white',\n          display: isSelected ? 'block' : 'none',\n        },\n        emiStyle: {\n          fontSize: isSelected ? 15 : 14, fontWeight: isSelected ? 700 : 500,\n          color: isSelected ? '#104D89' : '#0D0D0D', width: 70, flexShrink: 0,\n        },\n        tenureStyle: { fontSize: 12, color: '#999', width: 28, flexShrink: 0 },\n        totalStyle: { fontSize: 12, color: isSelected ? '#333' : '#999', flex: 1 },\n        noCostStyle: {\n          background: '#EAF4EC', color: '#107838', fontSize: 9, fontWeight: 700,\n          padding: '2px 6px', borderRadius: 9999, display: 'inline-block',\n        },\n        interestStyle: { fontSize: 11, fontWeight: 600, color: '#E6700F', flexShrink: 0 },\n        zeroStyle: { fontSize: 11, fontWeight: 700, color: '#107838', flexShrink: 0 },\n        savingStyle: { fontSize: 9, fontWeight: 700, color: '#107838', background: '#EAF4EC', padding: '1px 6px', borderRadius: 9999, display: 'inline-block' },\n      };\n    });\n\n    const ctaText = `Pay with EMI · ${sel} · ${selectedPlan.emi}/m`;\n\n    return {\n      isPdpPlans, isPdpExact: !isPdpPlans, isPdpCredit, isPdpDebit: !isPdpCredit,\n      pdpPlanTabStyle, pdpExactTabStyle, pdpCreditTabStyle, pdpDebitTabStyle,\n      switchToPdpPlans:  () => this.setState({ pdpEliTab: 'plans' }),\n      switchToPdpExact:  () => this.setState({ pdpEliTab: 'exact' }),\n      switchToPdpCredit: () => this.setState({ pdpCardType: 'credit' }),\n      switchToPdpDebit:  () => this.setState({ pdpCardType: 'debit' }),\n      qty, incQty: () => this.setState(s => ({ qty: Math.min(s.qty + 1, 5) })),\n      decQty: () => this.setState(s => ({ qty: Math.max(s.qty - 1, 1) })),\n      isCreditTab, isDebitTab: !isCreditTab,\n      creditTabStyle, debitTabStyle,\n      switchToCredit: () => this.setState({ eliTab: 'credit' }),\n      switchToDebit:  () => this.setState({ eliTab: 'debit' }),\n      planRows, selectedPlan, ctaText,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
