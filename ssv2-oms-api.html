<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopstacc v2 api</title>
    <meta
      name="description"
      content="REST API documentation for the Order Management System (OMS) Fynd Extension. Covers Auth, Catalog, Cart, Orders, Shipments, Inventory and Invoice endpoints."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Initialize theme early to prevent flash
      (function () {
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        /* Light Theme (Default) */
        --bg: #f8fafc;
        --bg2: #ffffff;
        --bg3: #f1f5f9;
        --bg4: #e2e8f0;
        --text: #0f172a;
        --text2: #475569;
        --text3: #64748b;
        --accent: #4f46e5;
        --accent2: #4338ca;
        --accent-glow: rgba(79, 70, 229, 0.08);
        --green: #10b981;
        --green-bg: #ecfdf5;
        --blue: #3b82f6;
        --blue-bg: #eff6ff;
        --amber: #f59e0b;
        --amber-bg: #fffbeb;
        --red: #ef4444;
        --red-bg: #fef2f2;
        --purple: #8b5cf6;
        --purple-bg: #f5f3ff;
        --cyan: #0891b2;
        --border: #e2e8f0;
        --border2: #cbd5e1;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --font: "Inter", system-ui, sans-serif;
        --mono: "JetBrains Mono", monospace;

        /* Theme-specific dynamic variables */
        --title-gradient: linear-gradient(135deg, #4f46e5, #9333ea, #db2777);
        --hero-glow: rgba(79, 70, 229, 0.1);
        --code-key: #2563eb;
        --code-str: #059669;
        --code-num: #d97706;
        --code-bool: #9333ea;
        --code-null: #64748b;
        --business-bg: #fdf2f8;
        --business-border: #fbcfe8;
        --auth-bg: #ecfeff;
        --auth-border: #cffafe;
        --nav-hover: rgba(79, 70, 229, 0.08);
      }

      [data-theme="dark"] {
        --bg: #0a0e1a;
        --bg2: #111827;
        --bg3: #1a2035;
        --bg4: #232b42;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --accent: #6366f1;
        --accent2: #818cf8;
        --accent-glow: rgba(99, 102, 241, 0.15);
        --green: #22c55e;
        --green-bg: rgba(34, 197, 94, 0.12);
        --blue: #3b82f6;
        --blue-bg: rgba(59, 130, 246, 0.12);
        --amber: #f59e0b;
        --amber-bg: rgba(245, 158, 11, 0.12);
        --red: #ef4444;
        --red-bg: rgba(239, 68, 68, 0.12);
        --purple: #a855f7;
        --purple-bg: rgba(168, 85, 247, 0.12);
        --cyan: #06b6d4;
        --border: #1e293b;
        --border2: #334155;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);

        /* Theme-specific dynamic variables overhead */
        --title-gradient: linear-gradient(135deg, #e2e8f0, #6366f1, #a855f7);
        --hero-glow: rgba(99, 102, 241, 0.18);
        --code-key: #7dd3fc;
        --code-str: #86efac;
        --code-num: #fbbf24;
        --code-bool: #c084fc;
        --code-null: #94a3b8;
        --business-bg: rgba(99, 102, 241, 0.05);
        --business-border: rgba(99, 102, 241, 0.2);
        --auth-bg: rgba(6, 182, 212, 0.1);
        --auth-border: rgba(6, 182, 212, 0.2);
        --nav-hover: rgba(99, 102, 241, 0.15);
      }
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 24px;
        font-size: 15px;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
      }
      a {
        color: var(--accent2);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* HERO */
      .hero {
        position: relative;
        padding: 80px 0 60px;
        text-align: center;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 80% 60% at 50% 0%,
          var(--hero-glow),
          transparent 70%
        );
        pointer-events: none;
      }
      .hero h1 {
        font-size: 2.8rem;
        font-weight: 800;
        background: var(--title-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
        position: relative;
      }
      .hero p {
        color: var(--text2);
        font-size: 1.05rem;
        max-width: 620px;
        margin: 0 auto 28px;
      }
      .hero .version {
        display: inline-block;
        padding: 5px 16px;
        border-radius: 999px;
        background: var(--accent-glow);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: var(--accent2);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* LAYOUT */
      .wrapper {
        display: flex;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
        gap: 32px;
      }
      .sidebar {
        position: sticky;
        top: 24px;
        align-self: flex-start;
        width: 280px;
        min-width: 280px;
        max-height: calc(100vh - 48px);
        overflow-y: auto;
        padding: 20px 0;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      .main {
        flex: 1;
        min-width: 0;
        padding-bottom: 120px;
      }

      /* SIDEBAR */
      .sidebar h3 {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text3);
        padding: 18px 16px 8px;
        margin: 0;
      }
      .sidebar a.nav-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--text2);
        border-radius: var(--radius-sm);
        transition: 0.2s;
      }
      .sidebar a.nav-link:hover,
      .sidebar a.nav-link.active {
        background: var(--nav-hover);
        color: var(--accent2);
        text-decoration: none;
      }
      .sidebar .method-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot-get {
        background: var(--green);
      }
      .dot-post {
        background: var(--blue);
      }
      .dot-put {
        background: var(--amber);
      }
      .dot-delete {
        background: var(--red);
      }
      .dot-patch {
        background: var(--purple);
      }

      /* SEARCH */
      .search-box {
        position: relative;
        margin: 0 16px 12px;
      }
      .search-box input {
        width: 100%;
        padding: 10px 14px 10px 38px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border2);
        background: var(--bg2);
        color: var(--text);
        font-size: 0.85rem;
        outline: none;
        transition: 0.25s;
      }
      .search-box input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .search-box svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        width: 16px;
        height: 16px;
      }

      /* SECTION */
      .api-section {
        margin-bottom: 48px;
      }
      .section-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-title .icon {
        width: 32px;
        height: 32px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
      }
      .section-desc {
        color: var(--text2);
        font-size: 0.9rem;
        margin-bottom: 24px;
        line-height: 1.8;
      }
      .section-desc code,
      .endpoint-body .desc code {
        background: var(--bg3);
        padding: 2px 7px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 0.82em;
        color: var(--accent2);
        border: 1px solid var(--border);
      }
      .section-desc strong,
      .endpoint-body .desc strong {
        color: var(--text);
        font-weight: 600;
      }
      .section-desc pre,
      .endpoint-body .desc pre {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--mono);
        font-size: 0.8rem;
        line-height: 1.7;
        overflow-x: auto;
        color: var(--text2);
        margin: 12px 0;
        white-space: pre;
      }
      .section-desc pre code,
      .endpoint-body .desc pre code {
        background: none;
        padding: 0;
        border: none;
        font-size: inherit;
        color: inherit;
      }

      /* ENDPOINT CARD */
      .endpoint {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 16px;
        overflow: hidden;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
      }
      .endpoint:hover {
        border-color: var(--border2);
        box-shadow: var(--shadow);
      }
      .endpoint-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
      }
      .method-badge {
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 0.72rem;
        font-weight: 700;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex-shrink: 0;
      }
      .method-GET {
        background: var(--green-bg);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .method-POST {
        background: var(--blue-bg);
        color: var(--blue);
        border: 1px solid rgba(59, 130, 246, 0.25);
      }
      .method-PUT {
        background: var(--amber-bg);
        color: var(--amber);
        border: 1px solid rgba(245, 158, 11, 0.25);
      }
      .method-DELETE {
        background: var(--red-bg);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.25);
      }
      .method-PATCH {
        background: var(--purple-bg);
        color: var(--purple);
        border: 1px solid rgba(168, 85, 247, 0.25);
      }
      .endpoint-path {
        font-family: var(--mono);
        font-size: 0.88rem;
        color: var(--text);
        font-weight: 500;
        flex: 1;
      }
      .endpoint-summary {
        color: var(--text2);
        font-size: 0.82rem;
        margin-left: auto;
        text-align: right;
        max-width: 300px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .endpoint-toggle {
        color: var(--text3);
        transition: transform 0.3s;
        flex-shrink: 0;
      }
      .endpoint.open .endpoint-toggle {
        transform: rotate(180deg);
      }

      /* ENDPOINT BODY */
      .endpoint-body {
        display: none;
        padding: 0 20px 20px;
        border-top: 1px solid var(--border);
        animation: slideDown 0.3s ease;
      }
      .endpoint.open .endpoint-body {
        display: block;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .endpoint-body .desc {
        color: var(--text2);
        font-size: 0.88rem;
        margin: 16px 0;
        line-height: 1.7;
      }
      .endpoint-body h4 {
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text3);
        margin: 20px 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .auth-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        background: var(--auth-bg);
        color: var(--cyan);
        border: 1px solid var(--auth-border);
        margin: 8px 0;
      }

      /* TABLE */
      .param-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.84rem;
      }
      .param-table th {
        text-align: left;
        padding: 10px 12px;
        background: var(--bg3);
        color: var(--text2);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .param-table th:first-child {
        border-radius: var(--radius-sm) 0 0 0;
      }
      .param-table th:last-child {
        border-radius: 0 var(--radius-sm) 0 0;
      }
      .param-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }
      .param-table tr:last-child td {
        border-bottom: none;
      }
      .param-table .param-name {
        font-family: var(--mono);
        font-weight: 500;
        color: var(--accent2);
        font-size: 0.82rem;
      }
      .param-table .param-type {
        color: var(--text3);
        font-size: 0.78rem;
      }
      .param-table .required {
        color: var(--red);
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 4px;
      }

      /* CODE BLOCK */
      .code-block {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px;
        font-family: var(--mono);
        font-size: 0.8rem;
        line-height: 1.7;
        overflow-x: auto;
        color: var(--text2);
        position: relative;
        max-height: 350px;
        overflow-y: auto;
      }
      .code-block .key {
        color: var(--code-key);
      }
      .code-block .str {
        color: var(--code-str);
      }
      .code-block .num {
        color: var(--code-num);
      }
      .code-block .bool {
        color: var(--code-bool);
      }
      .code-block .null {
        color: var(--code-null);
      }
      .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--bg3);
        border: 1px solid var(--border2);
        color: var(--text2);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.72rem;
        cursor: pointer;
        transition: 0.2s;
        font-family: var(--font);
      }
      .copy-btn:hover {
        background: var(--bg4);
        color: var(--text);
      }

      /* RESPONSE TABS */
      .resp-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .resp-tab {
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        transition: 0.2s;
      }
      .resp-tab.active,
      .resp-tab:hover {
        border-color: var(--accent);
        color: var(--accent2);
        background: var(--accent-glow);
      }
      .resp-tab.s2xx {
        color: var(--green);
      }
      .resp-tab.s4xx {
        color: var(--amber);
      }
      .resp-tab.s5xx {
        color: var(--red);
      }

      /* MOBILE */
      @media (max-width: 900px) {
        .wrapper {
          flex-direction: column;
        }
        .sidebar {
          position: static;
          width: 100%;
          max-height: none;
          border-bottom: 1px solid var(--border);
          padding-bottom: 16px;
        }
        .hero h1 {
          font-size: 2rem;
        }
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }

      /* BACK TO TOP */
      .back-top {
        position: fixed;
        bottom: 32px;
        right: 32px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        transition: 0.3s;
        z-index: 99;
        font-size: 1.2rem;
      }
      .back-top:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 28px rgba(99, 102, 241, 0.5);
      }
      .back-top.show {
        display: flex;
      }

      /* THEME TOGGLE */
      .theme-btn {
        position: fixed;
        top: 24px;
        right: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--bg2);
        border: 1px solid var(--border);
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
        transition: 0.3s;
        z-index: 1000;
        font-size: 1.2rem;
      }
      .theme-btn:hover {
        transform: scale(1.1);
        border-color: var(--accent);
      }
      [data-theme="dark"] .theme-btn .sun {
        display: block;
      }
      [data-theme="dark"] .theme-btn .moon {
        display: none;
      }
      .theme-btn .sun {
        display: none;
      }
      .theme-btn .moon {
        display: block;
      }

      /* BUSINESS DOCS */
      .business-box {
        background: var(--business-bg);
        border: 1px solid var(--business-border);
        border-radius: var(--radius-sm);
        padding: 16px;
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }
      .business-box::after {
        content: "BUSINESS CONTEXT";
        position: absolute;
        top: 0;
        right: 0;
        background: var(--accent);
        color: white;
        font-size: 0.65rem;
        font-weight: 800;
        padding: 3px 10px;
        border-radius: 0 0 0 8px;
        letter-spacing: 1px;
      }
      .business-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 0.72rem;
        font-weight: 600;
        background: var(--bg3);
        color: var(--text2);
        border: 1px solid var(--border);
        margin-bottom: 12px;
      }
      .business-label {
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent2);
        margin-bottom: 6px;
        display: block;
      }
      .business-text {
        font-size: 0.88rem;
        color: var(--text2);
        line-height: 1.6;
      }
      .endpoint-business-context {
        background: var(--bg3);
        border-left: 4px solid var(--cyan);
        padding: 12px 16px;
        margin: 16px 0;
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      }
      .endpoint-business-context strong {
        color: var(--cyan);
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
      }
      .endpoint-business-context p {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text2);
      }
    </style>
  </head>
  <body>
    <button class="theme-btn" id="themeToggle" title="Toggle Theme">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
    <!-- HERO -->
    <section class="hero">
      <h1>Shopstacc v2 api</h1>
      <p>
        REST API documentation for the Order Management System — covering
        Authentication, Catalog, Cart, Orders, Shipments, Inventory & Invoicing.
      </p>
    </section>

    <div class="wrapper">
      <!-- SIDEBAR -->
      <nav class="sidebar" id="sidebar">
        <div class="search-box">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="searchInput" placeholder="Search endpoints…" />
        </div>
        <div id="navLinks"></div>
      </nav>

      <!-- MAIN CONTENT -->
      <main class="main" id="mainContent"></main>
    </div>

    <button class="back-top" id="backTop" title="Back to top">↑</button>

    <script>
      // ── API DATA (non-admin only) ──────────────────────────────────
      const commonError400 = {
        success: false,
        message: "Bad Request",
        statusCode: 400,
        error: "Required parameters are missing or validation failed.",
      };
      const commonError401 = {
        success: false,
        message: "Unauthorized",
        statusCode: 401,
        error: "Missing or invalid authorization token.",
      };
      const commonError404 = {
        success: false,
        message: "Not Found",
        statusCode: 404,
        error: "The requested resource could not be found.",
      };
      const commonError500 = {
        success: false,
        message: "Internal Server Error",
        statusCode: 500,
        error: "An unexpected error occurred on the server.",
      };

      const API_SECTIONS = [
        {
          id: "auth",
          title: "Authentication",
          icon: "🔐",
          desc:

            "<code>canonical = X-Access-Key + X-Timestamp</code><br>" +
            "<code>signature = HMAC-SHA256(secretKey, canonical).hex()</code><br><br>" +

        {
          id: "invoice",
          title: "Invoice",
          icon: "🧾",
          desc: "Invoice retrieval by shipment ID — requires Bearer JWT.",
          businessOverview:
            "The final step in the financial transaction. Invoices are legal documents required for taxation, returns, and customer records. This section allows for the generation and retrieval of standard invoices, e-way bills (for transport compliance), and e-invoices (for digital reporting).",
          endpoints: [
            {
              method: "GET",
              path: "/api/invoice/{shipmentId}",
              summary: "Get invoice by Shipment ID",
              businessContext: "Provides a downloadable PDF link for the customer. It includes the grand total, GST breakdown, and billing/shipping addresses as they were at the time of purchase.",
              desc: "Retrieves the invoice document for a given shipment.",
              auth: "Bearer JWT",
              params: [
                {
                  name: "shipmentId",
                  in: "path",
                  type: "string",
                  required: true,
                  desc: "Shipment ID",
                },
              ],
              response: {
                200: {
                  success: true,
                  message: "Invoice retrieved successfully",
                  statusCode: 200,
                  data: {
                    shipment: {
                      invoice_detail: {
                        presigned_type: "GET",
                        presigned_url: "presigned_url",
                        shipment_id: "shipment_id",
                        success: true,
                      },
                    },
                  },
                },
              },
            },
            {
              method: "GET",
              path: "/api/invoice/{shipmentId}/{orderId}/ewaybill",
              summary: "Get e-way bill",
              desc: "Retrieves the e-way bill PDF for a given shipment and order. Streams PDF directly.",
              auth: "Bearer JWT",
              params: [
                {
                  name: "shipmentId",
                  in: "path",
                  type: "string",
                  required: true,
                  desc: "Shipment ID",
                },
                {
                  name: "orderId",

            },
            {
              method: "GET",
              path: "/api/invoice/{shipmentId}/{orderId}/e-invoice",
              summary: "Get e-invoice",
              desc: "Downloads the e-invoice PDF for a given shipment and order.",
              auth: "Bearer JWT",
              params: [
                {
                  name: "shipmentId",
                  in: "path",
                  type: "string",
                  required: true,
                  desc: "Shipment ID",
                },
                {
                  name: "orderId",
                  in: "path",
                  type: "string",
                  required: true,
                  desc: "Order ID",
                },
              ],
              response: { 200: "PDF binary stream (application/pdf)" },
            },

      ];

      // Auto-populate missing error responses for all endpoints
      API_SECTIONS.forEach((section) => {
        section.endpoints.forEach((ep) => {
          if (!ep.response) ep.response = {};
          // If no 4xx error is defined, add the standard 400 error
          if (!ep.response[400] && !ep.response[401] && !ep.response[403] && !ep.response[404]) {
            ep.response[400] = commonError400;
          }
          // If no 500 error is defined, add the standard 500 error
          if (!ep.response[500]) {
            ep.response[500] = commonError500;
          }
        });
      });

      // Auto-populate x-cookie header for relevant customer-context sections
      const customerContextSections = ["addresses", "cart", "orders", "shipments", "invoice"];
      API_SECTIONS.forEach((section) => {
        if (customerContextSections.includes(section.id)) {
          section.endpoints.forEach((ep) => {
            // Skip e-waybill and e-invoice endpoints as requested
            if (ep.path.endsWith("/ewaybill") || ep.path.endsWith("/e-invoice")) {
              return;
            }
            if (!ep.params) ep.params = [];
            // Only add if not already present
            if (!ep.params.some((p) => p.name === "x-cookie")) {
              ep.params.unshift({
                name: "x-cookie",
                in: "header",
                type: "string",
                required: false,
                desc: "Session cookie obtained from registration/login (format: f.session=<cookie_value>)",
              });
            }
          });
        }
      });

      // ── RENDER ──────────────────────────────────────────────────────
      const mainEl = document.getElementById("mainContent");
      const navEl = document.getElementById("navLinks");

      function syntaxHighlight(obj, indent = 0) {
        if (typeof obj === "string" && indent === 0)
          return `<span class="str">"${escHtml(obj)}"</span>`;
        const json = JSON.stringify(obj, null, 2);
        return json.replace(
          /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
          (m) => {
            let cls = "num";
            if (/^"/.test(m)) cls = /:$/.test(m) ? "key" : "str";
            else if (/true|false/.test(m)) cls = "bool";
            else if (/null/.test(m)) cls = "null";
            return `<span class="${cls}">${m}</span>`;
          },
        );
      }
      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function makeId(section, idx) {
        return `${section.id}-${idx}`;
      }

      API_SECTIONS.forEach((section) => {
        // NAV
        let navHtml = `<h3>${section.title}</h3>`;
        section.endpoints.forEach((ep, i) => {
          const dotCls = "dot-" + ep.method.toLowerCase();
          navHtml += `<a class="nav-link" href="#${makeId(section, i)}" data-search="${ep.method} ${ep.path} ${ep.summary}"><span class="method-dot ${dotCls}"></span>${ep.summary}</a>`;
        });
        navEl.innerHTML += navHtml;

        // MAIN
        let html = `<section class="api-section" id="section-${section.id}">
    <div class="section-title"><span class="icon">${section.icon}</span>${section.title}</div>
    <div class="section-desc">${section.desc}</div>`;

        if (section.businessOverview) {
          html += `<div class="business-box">
            <span class="business-label">Business Overview</span>
            <div class="business-text">${section.businessOverview}</div>
          </div>`;
        }
        section.endpoints.forEach((ep, i) => {
          const eid = makeId(section, i);
          html += `<div class="endpoint" id="${eid}">
      <div class="endpoint-header" onclick="toggleEndpoint(this)">
        <span class="method-badge method-${ep.method}">${ep.method}</span>
        <span class="endpoint-path">${ep.path}</span>
        <span class="endpoint-summary">${ep.summary}</span>
        <svg class="endpoint-toggle" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="endpoint-body">
        <p class="desc">${ep.desc}</p>`;

          if (ep.businessContext) {
            html += `<div class="endpoint-business-context">
              <strong>Business Context</strong>
              <p>${ep.businessContext}</p>
            </div>`;
          }
          if (ep.auth) html += `<div class="auth-badge">🔒 ${ep.auth}</div>`;
          if (ep.params && ep.params.length) {
            html += `<h4>Parameters</h4><table class="param-table"><thead><tr><th>Name</th><th>In</th><th>Type</th><th>Description</th></tr></thead><tbody>`;
            ep.params.forEach((p) => {
              html += `<tr><td><span class="param-name">${p.name}</span>${p.required ? '<span class="required">*</span>' : ""}</td><td>${p.in}</td><td class="param-type">${p.type}</td><td>${p.desc}</td></tr>`;
            });
            html += "</tbody></table>";
          }
          if (ep.bodyFields && ep.bodyFields.length) {
            html += `<h4>Request Body Schema</h4><table class="param-table"><thead><tr><th>Field</th><th>Type</th><th>Required</th><th>Description</th></tr></thead><tbody>`;
            ep.bodyFields.forEach((f) => {
              html += `<tr><td><span class="param-name">${f.name}</span></td><td class="param-type">${f.type}</td><td>${f.required ? '<span class="required" style="font-size:.78rem">Yes</span>' : '<span style="color:var(--text3);font-size:.78rem">No</span>'}</td><td>${f.desc}</td></tr>`;
            });
            html += "</tbody></table>";
          }
          if (ep.body) {
            html += `<h4>Request Body Example</h4><div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button>${syntaxHighlight(ep.body)}</div>`;
          }
          html += `<h4>Response</h4>`;
          const resp = ep.response;
          const statusCodes = Object.keys(resp).sort();

          if (statusCodes.length > 0) {
            html += `<div class="resp-tabs">`;
            statusCodes.forEach((code, idx) => {
              const cls = code.startsWith("2") ? "s2xx" : code.startsWith("4") ? "s4xx" : "s5xx";
              const label = code.startsWith("4") ? "4xx" : code.startsWith("5") ? "500" : code;
              html += `<span class="resp-tab ${idx === 0 ? "active" : ""} ${cls}" onclick="switchTab(this, '${eid}', '${code}')">${label}</span>`;
            });
            html += `</div>`;

            statusCodes.forEach((code, idx) => {
              html += `<div id="res-${eid}-${code}" class="code-block" style="display: ${idx === 0 ? "block" : "none"}">
                ${!(code === "200" && typeof resp[code] === "string") ? '<button class="copy-btn" onclick="copyCode(this)">Copy</button>' : ""}
                ${typeof resp[code] === "string" ? escHtml(resp[code]) : syntaxHighlight(resp[code])}
              </div>`;
            });
          }
          html += `</div></div>`;
        });
        html += "</section>";
        mainEl.innerHTML += html;
      });

      // ── INTERACTIONS ────────────────────────────────────────────────
      function toggleEndpoint(header) {
        header.parentElement.classList.toggle("open");
      }
      function switchTab(btn, eid, code) {
        const group = btn.parentElement;
        group.querySelectorAll(".resp-tab").forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");

        const parent = group.parentElement;
        // Only hide code blocks that are part of the response section (starting with 'res-')
        parent.querySelectorAll(`.code-block[id^="res-${eid}-"]`).forEach((b) => (b.style.display = "none"));
        document.getElementById(`res-${eid}-${code}`).style.display = "block";
      }
      function copyCode(btn) {
        const block = btn.parentElement;
        const text = block.innerText.replace("Copy", "").trim();
        navigator.clipboard.writeText(text);
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      }

      // Sidebar nav click — smooth scroll with offset & open accordion
      document.querySelectorAll(".nav-link").forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          const targetId = this.getAttribute("href").substring(1);
          const target = document.getElementById(targetId);
          if (target) {
            // Open the accordion
            if (target.classList.contains("endpoint")) {
              target.classList.add("open");
            }

            const offset = 24;
            const top =
              target.getBoundingClientRect().top + window.scrollY - offset;
            window.scrollTo({ top, behavior: "smooth" });
            
            // Update URL hash without jump
            history.pushState(null, null, `#${targetId}`);
          }
        });
      });

      // Handle hash-based opening on load
      window.addEventListener("load", () => {
        const hash = window.location.hash.substring(1);
        if (hash) {
          const target = document.getElementById(hash);
          if (target) {
            // Open the accordion if it's an endpoint
            if (target.classList.contains("endpoint")) {
               target.classList.add("open");
            }
            
            // Allow some time for the accordion to render/open before scrolling
            setTimeout(() => {
              const offset = 24;
              const top = target.getBoundingClientRect().top + window.scrollY - offset;
              window.scrollTo({ top, behavior: "smooth" });
            }, 200);
          }
        }
      });

      // Search
      document
        .getElementById("searchInput")
        .addEventListener("input", function () {
          const q = this.value.toLowerCase();
          document
            .querySelectorAll(".nav-link")
            .forEach(
              (l) =>
                (l.style.display = l.dataset.search.toLowerCase().includes(q)
                  ? ""
                  : "none"),
            );
          document.querySelectorAll(".endpoint").forEach((el) => {
            const txt = (
              el.querySelector(".endpoint-path")?.textContent +
              " " +
              el.querySelector(".endpoint-summary")?.textContent
            ).toLowerCase();
            el.style.display = txt.includes(q) ? "" : "none";
          });
        });

      // Back to top
      const backTop = document.getElementById("backTop");
      window.addEventListener("scroll", () =>
        backTop.classList.toggle("show", window.scrollY > 400),
      );
      backTop.addEventListener("click", () =>
        window.scrollTo({ top: 0, behavior: "smooth" }),
      );

      // Active nav link — highlight on scroll & scroll sidebar into view
      function setActiveNav(id) {
        document
          .querySelectorAll(".nav-link")
          .forEach((l) => l.classList.remove("active"));
        const link = document.querySelector(`.nav-link[href="#${id}"]`);
        if (link) {
          link.classList.add("active");
          link.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              setActiveNav(e.target.id);
            }
          });
        },
        { threshold: 0.1, rootMargin: "-20px 0px -70% 0px" },
      );
      document
        .querySelectorAll(".endpoint")
        .forEach((el) => observer.observe(el));

      // Also observe section headers for better tracking
      document
        .querySelectorAll(".api-section")
        .forEach((el) => observer.observe(el));

      // Theme Toggle Logic
      const themeToggle = document.getElementById("themeToggle");
      themeToggle.addEventListener("click", () => {
        const currentTheme =
          document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      });
    </script>
