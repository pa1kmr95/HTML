<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Client / Tenant Settings – Earn & Burn</title>
<style>
:root {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #111827;
  background: #f3f4f6;
}
body { margin: 0; padding: 0; }
.app-shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
header { margin-bottom: 16px; }
header h1 { margin: 0; font-size: 24px; }
header .subtitle { color: #6b7280; font-size: 13px; margin-top: 4px; }
.card { background: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(15,23,42,0.08); }
summary { cursor: pointer; font-weight: 600; font-size: 15px; }
details { margin-bottom: 14px; }
details[open] summary { margin-bottom: 10px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px 16px; }
.field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
label { font-weight: 500; }
input, select { border-radius: 8px; border: 1px solid #d1d5db; padding: 6px 8px; font-size: 13px; background: #f9fafb; }
.hint { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app-shell">
<header>
  <h1>Client / Tenant Settings</h1>
  <div class="subtitle">Reusable, program-level configurations shared across both Earn and Burn modules.</div>
</header>

<!-- A. PROGRAM ENABLEMENT -->
<details open class="card">
  <summary>A. Program Enablement</summary>
  <div class="form-grid">
    <div class="field"><label>Earn Enabled</label><select><option>Yes</option><option>No</option></select></div>
    <div class="field"><label>Burn Enabled</label><select><option>Yes</option><option>No</option></select></div>
    <div class="field"><label>Disable Reason (internal)</label><input placeholder="e.g. RBI audit / reconciliation freeze" /></div>
  </div>
</details>

<!-- B. CARD & POINT ECONOMICS -->
<details open class="card">
  <summary>B. Card & Point Economics</summary>
  <div class="hint">Defines earn and burn value per point for each card variant.</div>
  <div class="form-grid">
    <div class="field"><label>Card Variant</label><input placeholder="e.g. HDFC Regalia" /></div>
    <div class="field"><label>Earn Value (₹ per point)</label><input placeholder="e.g. 0.25" /></div>
    <div class="field"><label>Burn Value (₹ per point)</label><input placeholder="e.g. 0.20" /></div>
    <div class="field"><label>Burn Allowed on Card</label><select><option>Yes</option><option>No</option></select></div>
  </div>
</details>

<!-- C. GLOBAL BURN GUARDRAILS -->
<details open class="card">
  <summary>C. Global Burn Guardrails</summary>
  <div class="form-grid">
    <div class="field"><label>Minimum Points per Redemption</label><input placeholder="e.g. 500" /></div>
    <div class="field"><label>Maximum Points per Transaction</label><input placeholder="e.g. 50000" /></div>
    <div class="field"><label>Max % of Order Payable via Points</label><input placeholder="e.g. 70" /></div>
    <div class="field"><label>Allow Full Burn (100%)</label><select><option>Yes</option><option>No</option></select></div>
  </div>
</details>

<!-- D. PRICE SOURCE PRIORITY -->
<details open class="card">
  <summary>D. Price Source Priority (Burn)</summary>
  <div class="form-grid">
    <div class="field"><label>Price Used for Burn Calculation</label>
      <select>
        <option>Min(Selling Price, Discounted Price)</option>
        <option>Selling Price Only</option>
        <option>Discounted Price Only</option>
      </select>
    </div>
  </div>
</details>

<!-- E. ROUNDING & PRECISION -->
<details open class="card">
  <summary>E. Rounding & Precision</summary>
  <div class="form-grid">
    <div class="field"><label>Rounding Mode</label><select><option>Floor</option><option>Ceil</option><option>Nearest</option></select></div>
    <div class="field"><label>Rounding Unit</label><select><option>1 Point</option><option>10 Points</option><option>50 Points</option></select></div>
    <div class="field"><label>₹ Precision</label><select><option>0 decimals</option><option>2 decimals</option></select></div>
  </div>
</details>

</div>
</body>
</html>
